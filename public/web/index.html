<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sub2API Auto Relogin</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <h1>Sub2API Auto Relogin</h1>
          <p id="subtitle">Mailbox and relogin monitor</p>
        </div>
        <div class="top-actions">
          <span id="autoCheckStatus" class="check-pill">自动检测：读取中</span>
          <button id="autoCheckToggleBtn" class="toggle-check" data-enabled="true">暂停检测</button>
          <button id="refreshBtn" class="primary">刷新</button>
          <button id="sub2apiCheckBtn">检测 Sub2API</button>
        </div>
      </section>

      <section class="stats" aria-label="stats">
        <article>
          <span>邮箱总数</span>
          <strong id="statTotal">0</strong>
        </article>
        <article>
          <span>正常</span>
          <strong id="statOk">0</strong>
        </article>
        <article>
          <span>异常</span>
          <strong id="statError">0</strong>
        </article>
        <article>
          <span>SUB2API 失败</span>
          <strong id="statFail">0</strong>
        </article>
      </section>

      <section class="grid">
        <aside class="panel import-panel">
          <div class="panel-head">
            <h2>导入邮箱</h2>
            <span>邮箱--密码 / Token 自动识别</span>
          </div>
          <textarea id="importText" spellcheck="false" placeholder="IMAP: user@example.com----password&#10;Token: user@example.com----password----refreshToken----clientId&#10;GuJumpgate: user@example.com----password----clientId----refreshToken"></textarea>
          <div class="button-row">
            <button id="importBtn" class="primary">导入/更新</button>
            <button id="clearImportBtn">清空</button>
          </div>
          <p id="importResult" class="hint"></p>

          <div class="panel-head compact">
            <h2>批量操作</h2>
            <span id="selectedCount">未选择</span>
          </div>
          <div class="button-grid">
            <button id="checkSelectedBtn">检测选中</button>
            <button id="checkAllBtn">检测全部</button>
            <button id="deleteSelectedBtn" class="danger">删除选中</button>
            <button id="deleteAllBtn" class="danger soft">删除全部</button>
          </div>
          <label class="checkline">
            <input id="deleteSub2api" type="checkbox">
            <span>删除时同时删除 SUB2API 账号</span>
          </label>

          <div class="panel-head compact">
            <h2>OpenAI 授权</h2>
            <span>生成链接后用无痕窗口登录</span>
          </div>
          <div class="relogin-box">
            <label>
              <span>SUB2API 代理绑定</span>
              <select id="reloginProxyMode">
                <option value="none">直连 / 无代理</option>
                <option value="custom">手填代理</option>
              </select>
            </label>
            <div id="customProxyFields" class="proxy-fields hidden">
              <input id="proxyServer" type="text" placeholder="http://host:port 或 socks5://host:port">
              <input id="proxyUsername" type="text" placeholder="代理用户名，可留空">
              <input id="proxyPassword" type="password" placeholder="代理密码，可留空">
            </div>
            <button id="reloginSelectedBtn" class="primary">生成授权链接</button>
            <label>
              <span>授权链接</span>
              <textarea id="authUrlText" readonly spellcheck="false" placeholder="选择一个邮箱后点击生成授权链接"></textarea>
            </label>
            <button id="copyAuthUrlBtn">复制授权链接</button>
            <label>
              <span>回调地址</span>
              <textarea id="callbackUrlText" spellcheck="false" placeholder="登录完成后，把地址栏里 http://localhost... 开头的完整网址粘贴到这里"></textarea>
            </label>
            <button id="completeAuthBtn" class="primary">完成授权并写入 SUB2API</button>
            <p id="reloginResult" class="hint"></p>
          </div>
        </aside>

        <section class="panel table-panel">
          <div class="panel-head table-tools">
            <div>
              <h2>邮箱列表</h2>
              <span id="lastChecked">等待刷新</span>
            </div>
            <input id="searchInput" type="search" placeholder="搜索邮箱或状态">
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th class="select-col"><input id="selectAll" type="checkbox" aria-label="选择全部"></th>
                  <th>邮箱</th>
                  <th>状态</th>
                  <th>最近授权</th>
                  <th>错误</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="accountsBody">
                <tr>
                  <td colspan="6" class="empty">正在加载...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </section>

      <section class="panel log-panel">
        <div class="panel-head">
          <div>
            <h2>日志</h2>
            <span>检测、重登、清理和页面操作</span>
          </div>
          <button id="copyLogsBtn">复制日志</button>
        </div>
        <pre id="logsBox">正在加载日志...</pre>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
    <script src="/app.js"></script>
  </body>
</html>
